services:
  booksearch:
    image: ghcr.io/muszkin/booksearch:latest
    container_name: booksearch
    restart: unless-stopped
    ports:
      - "${BOOKSEARCH_PORT:-5000}:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-to-random-string}
      - DEFAULT_USER=${DEFAULT_USER:-admin}
      - DEFAULT_PASS=${DEFAULT_PASS:-admin}
      - FLARESOLVERR_URL=http://flaresolverr:8191/v1
      - STACKS_URL=http://stacks:7788
      - STACKS_USER=${STACKS_USER:-admin}
      - STACKS_PASS=${STACKS_PASS:-mucha2024}
      - DATA_DIR=/data
      - CALIBRE_LIBRARY_PATH=/library
    volumes:
      - booksearch-data:/data
      - calibre-library:/library:ro
    networks:
      - booksearch
    depends_on:
      - flaresolverr
      - stacks

  stacks:
    image: zelest/stacks:latest
    container_name: stacks
    restart: unless-stopped
    ports:
      - "${STACKS_PORT:-8585}:7788"
    volumes:
      - stacks-config:/config
      - incoming:/opt/stacks/download
    networks:
      - booksearch

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
    networks:
      - booksearch

  calibre:
    image: lscr.io/linuxserver/calibre:latest
    container_name: calibre
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - calibre-config:/config
      - calibre-library:/books
      - incoming:/incoming
    ports:
      - "${CALIBRE_PORT:-8182}:8080"
      - "${CALIBRE_CONTENT_PORT:-8181}:8181"
    networks:
      - booksearch

  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - calibre-web-config:/config
      - calibre-library:/books:ro
    ports:
      - "${CALIBRE_WEB_PORT:-8084}:8083"
    networks:
      - booksearch
    depends_on:
      - calibre

  calibre-import:
    image: ghcr.io/muszkin/booksearch-calibre-import:latest
    container_name: calibre-import
    restart: unless-stopped
    environment:
      - INCOMING_DIR=/incoming
      - CALIBRE_LIBRARY=/books
    volumes:
      - incoming:/incoming
      - calibre-library:/books
    networks:
      - booksearch
    depends_on:
      - calibre

volumes:
  booksearch-data:
  stacks-config:
  incoming:
  calibre-config:
  calibre-library:
  calibre-web-config:

networks:
  booksearch:
    driver: bridge
